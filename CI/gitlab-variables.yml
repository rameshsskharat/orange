# GitLab CI/CD Variables Configuration
# This file demonstrates all variable types and their configurations

variables:
  # Predefined Variables (Read-only, set by GitLab)
  CI_COMMIT_SHA: "$CI_COMMIT_SHA"
  CI_COMMIT_REF_NAME: "$CI_COMMIT_REF_NAME"
  CI_PROJECT_ID: "$CI_PROJECT_ID"
  CI_PIPELINE_ID: "$CI_PIPELINE_ID"
  dish: "samosa"

  # String Variables (Basic text)
  ENVIRONMENT: "production"
  APP_NAME: "my-application"
  VERSION: "1.0.0"

  # Boolean Variables
  DEBUG_MODE: "false"
  ENABLE_CACHE: "true"

  # Numeric Variables
  MAX_CONNECTIONS: "100"
  TIMEOUT_SECONDS: "30"

  # URL Variables
  API_ENDPOINT: "https://api.example.com"
  REGISTRY_URL: "registry.example.com"

  # File Path Variables
  CONFIG_PATH: "./config/settings.yml"
  BUILD_ARTIFACT_PATH: "dist/"

  # Protected Variables (Only available in protected branches/tags)
  # Note: Mark as protected in GitLab UI
  DATABASE_PASSWORD: "secret_password"
  API_TOKEN: "secure_token"

  # Masked Variables (Hidden in logs)
  # Note: Mark as masked in GitLab UI
  SSH_PRIVATE_KEY: "${SSH_KEY}"
  DOCKER_REGISTRY_PASSWORD: "${REGISTRY_PASS}"

  # Environment-specific Variables
  STAGING_URL: "https://staging.example.com"
  PRODUCTION_URL: "https://prod.example.com"

  # Build Variables
  BUILD_TYPE: "release"
  COMPILER_FLAGS: "-O2 -Wall"

  # Deployment Variables
  DEPLOY_USER: "deploy_user"
  DEPLOY_ENVIRONMENT: "kubernetes"

stages:
  - build
  - test
  - deploy

# Example job using variables
build_job:
  stage: build
  script:
    - echo "Building $APP_NAME version $VERSION"
    - echo "Environment: $ENVIRONMENT"
    - echo "API: $API_ENDPOINT"
  variables:
    # Job-level override
    ENVIRONMENT: "development"
  only:
    - main
    - tags

  test_job:
      stage: test
      script:
        - echo "Project: $CI_PROJECT_PATH"
        - echo "Runner: $CI_RUNNER_ID"
        - echo "Job: $CI_JOB_ID"
        - echo "Stage: $CI_JOB_STAGE"
        - echo "URL: $CI_PROJECT_URL"
        - echo "Commit message: $CI_COMMIT_MESSAGE"
      only:
        - merge_requests
        - main