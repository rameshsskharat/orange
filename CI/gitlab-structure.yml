stages:
  - build
  - test
  - deploy

variables:
  CI_DEBUG_TRACE: "false"

build:
  stage: build
  script:
    - echo "Building application..."
  artifacts:
    paths:
      - build/
    expire_in: 1 week

test:
  stage: test
  script:
    - echo "Running tests..."
  coverage: '/Coverage: \d+\.\d+%/'

deploy:
  stage: deploy
  script:
    - echo "Deploying application..."
  only:
    - main